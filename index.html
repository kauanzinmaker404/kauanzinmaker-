<!DOCTYPE html>
<html>
<head>
  <title>Kauanzin</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      color: white;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a, #000);
      padding-top: 80px;
    }

    img {
      width: 150px;
      border-radius: 50%;
      border: 3px solid #00ffcc;
      box-shadow: 0 0 20px #00ffcc;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 40px;
    }

    a {
      display: block;
      margin: 20px auto;
      padding: 18px;
      width: 260px;
      background: #00ffcc;
      color: black;
      text-decoration: none;
      border-radius: 15px;
      font-weight: bold;
      font-size: 18px;
      transition: 0.3s;
      box-shadow: 0 0 10px #00ffcc;
    }

    a:hover {
      transform: scale(1.05);
      background: #00ccaa;
      box-shadow: 0 0 25px #00ffcc;
    }

    .container {
      animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="https://via.placeholder.com/150">
    <h1>@kauanzinmaker</h1>

    <a href="https://tiktok.com/@oliveirazz7_">🔥 TikTok</a>
    <a href="https://instagram.com/kauanzinmaker">📸 Instagram</a>
  </div>

</body>
</html>
