<!DOCTYPE html>
<html lang=pt-br>
<head>
  <meta charset=UTF-8>
  <title>Kauanzinmaker Dev</title>
  <meta name=viewport content=width=device-width, initial-scale=1.0>

  <!-- Fonte -->
  <link href=https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap rel=stylesheet>

  <!-- Ícones -->
  <link rel=stylesheet href=https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
      gap: 15px;
    }

    /* TEXTO DINÂMICO */
    .typing {
      border-right: 3px solid #22c55e;
      white-space: nowrap;
      overflow: hidden;
      color: #cbd5f5;
      font-size: 18px;
      padding-right: 5px;
    }

    .btn {
      padding: 12px 25px;
      border-radius: 8px;
      background: #22c55e;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background: #16a34a;
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 10px 25px rgba(34, 197, 94, 0.4);
    }

    .card {
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      width: 300px;
    }

    .links {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <header>
    kauanzinmaker ⚡ DEV
  </header>

  <div class=container>

    <!-- TEXTO DINÂMICO -->
    <p class=typing id=typing></p>

    <!-- BIO -->
    <div class=card>
      <h3>🚀 Biografia</h3>
      <p>Acredite que você pode, assim você já está no meio do caminho.</p>
    </div>

    <!-- SYSTEM -->
    <div class=card>
      <h3>💻 System</h3>
      <p>Desenvolvedor de sistemas.</p>
    </div>

    <!-- LINKS -->
    <div class=links>
      <a href=https://instagram.com/kauanzinmaker target=_blank class=btn>
        <i class=fab fa-instagram></i> Instagram
      </a>

      <a href=https://tiktok.com/@oliveirazz7_ target=_blank class=btn>
        <i class=fab fa-tiktok></i> TikTok
      </a>

      <a href=https://wa.me/55SEUNUMEROAQUI target=_blank class=btn>
        <i class=fab fa-whatsapp></i> WhatsApp
      </a>

      <a href=mailto:kauanzinmaker404@gmail.com class=btn>
        <i class=fas fa-envelope></i> Gmail
      </a>
    </div>

  </div>

  <footer>
    © 2026 Kauanzinmaker - Todos os direitos reservados.
  </footer>

  <!-- SCRIPT DIGITANDO -->
  <script>
    const texts = [
      Em meios a Tecnologia Avançada 🔥,
      Criando sistemas. 💻
    ];

    let count = 0;
    let index = 0;
    let currentText = "";
    let letter = "";

    (function type() {
      if (count === texts.length) {
        count = 0;
      }

      currentText = texts[count];
      letter = currentText.slice(0, ++index);

      document.getElementById(typing).textContent = letter;

      if (letter.length === currentText.length) {
        setTimeout(() => {
          index = 0;
          count++;
          setTimeout(type, 500);
        }, 2000);
      } else {
        setTimeout(type, 100);
      }
    })();
  </script>

</body>
</html>
